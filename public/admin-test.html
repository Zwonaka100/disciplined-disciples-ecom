<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access Test</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; max-width: 600px; margin: 0 auto; }
        .box { padding: 20px; border-radius: 8px; margin: 20px 0; }
        .info { background: #e3f2fd; border: 1px solid #2196f3; }
        .success { background: #e8f5e9; border: 1px solid #4caf50; }
        .error { background: #ffebee; border: 1px solid #f44336; }
        .admin-list { background: #f5f5f5; padding: 10px; border-radius: 4px; margin: 10px 0; }
        code { background: #eee; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>🔐 Admin Access Test</h1>
    <p>This page tests if your account has admin access. NO REDIRECTS - just shows the result.</p>
    
    <div id="status" class="box info">
        <h3>⏳ Checking...</h3>
        <p>Waiting for Firebase to load...</p>
    </div>

    <div class="admin-list">
        <strong>Admin emails allowed:</strong>
        <ul>
            <li>zmabege@gmail.com</li>
            <li>nomaqhizazolile@gmail.com</li>
        </ul>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: window.FIREBASE_API_KEY || "YOUR_API_KEY_HERE",
            authDomain: "disciplined-disciples-1.firebaseapp.com",
            projectId: "disciplined-disciples-1",
            storageBucket: "disciplined-disciples-1.firebasestorage.app",
            messagingSenderId: "770742520497",
            appId: "1:770742520497:web:3bf5d1e8c2f3e8a6e0a6d0"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const ADMIN_EMAILS = ['zmabege@gmail.com', 'nomaqhizazolile@gmail.com'];

        const statusDiv = document.getElementById('status');

        function updateStatus(type, title, message) {
            statusDiv.className = 'box ' + type;
            statusDiv.innerHTML = '<h3>' + title + '</h3><p>' + message + '</p>';
        }

        auth.onAuthStateChanged((user) => {
            console.log('Auth state changed:', user);
            
            if (!user) {
                updateStatus('error', '❌ Not Logged In', 
                    'You are not logged in.<br><br>' +
                    '<a href="login-signup.html">Click here to login</a>');
                return;
            }

            const email = user.email;
            const emailLower = email ? email.toLowerCase().trim() : '';
            const isAdmin = ADMIN_EMAILS.includes(emailLower);

            console.log('Email:', email);
            console.log('Email lowercase:', emailLower);
            console.log('Is admin:', isAdmin);

            if (isAdmin) {
                updateStatus('success', '✅ ACCESS GRANTED', 
                    'You ARE an admin!<br><br>' +
                    '<strong>Your email:</strong> <code>' + email + '</code><br><br>' +
                    '<a href="admin-products.html">Go to Product Management →</a>');
            } else {
                updateStatus('error', '❌ ACCESS DENIED', 
                    'You are NOT an admin.<br><br>' +
                    '<strong>Your email:</strong> <code>' + email + '</code><br><br>' +
                    'This email is not in the admin list.<br><br>' +
                    '<strong>Admin emails are:</strong><br>' +
                    '• zmabege@gmail.com<br>' +
                    '• nomaqhizazolile@gmail.com<br><br>' +
                    'Please log out and log in with an admin account.<br><br>' +
                    '<a href="login-signup.html">Go to Login Page</a>');
            }
        });
    </script>
</body>
</html>
